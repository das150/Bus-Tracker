        /* --- REPLACE SIDEBAR & ADD DRAWER CSS in <style> --- */
#sidebar {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: rgba(255, 255, 255, 0.98);
    border-radius: 20px 20px 0 0;
    box-shadow: 0 -5px 25px rgba(0,0,0,0.15);
    z-index: 2000;
    display: flex;
    flex-direction: column;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    /* Collapsed state: shows handle and header only */
    transform: translateY(calc(100% - 130px)); 
    max-height: 90vh;
}

/* --- REPLACE #sidebar AND @media in <style> --- */
#sidebar {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: #ffffff; 
    border-radius: 24px 24px 0 0;
    box-shadow: 0 -8px 30px rgba(0,0,0,0.15);
    z-index: 2000;
    display: flex;
    flex-direction: column;
    
    /* Mobile Drawer Heights */
    height: 90dvh; 
    max-height: 90dvh;
    transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    transform: translateY(calc(100% - 140px)); 

    /* The "Skirt" Buffer - ONLY for mobile */
    padding-bottom: 100px;
    margin-bottom: -100px;
}

#sidebar.open {
    transform: translateY(0);
}

/* DESKTOP RESET */
@media (min-width: 768px) {
    #sidebar {
        /* Reset positioning */
        top: 15px;
        left: 15px;
        bottom: auto;
        width: 350px;
        
        /* Reset heights */
        height: auto; 
        max-height: 90vh;
        border-radius: 12px;
        
        /* IMPORTANT: Remove transformations and buffers */
        transform: none !important; 
        padding-bottom: 0; 
        margin-bottom: 0;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
}

/* --- ADD TO <style> --- */

}

#drag-handle {

}

#sidebar.open {

}

/* The scrolling container */
#alert-inner {

}

/* Pause the scroll when you hover to read specific details */
#alert-box:hover #alert-inner {
    animation-play-state: paused;
}

}

function isActuallyLastRun(routeId, serviceLevel) {
    const logic = btOperationalLogic[routeId];
    if (!logic || !logic.ends || !logic.ends[serviceLevel]) return false;
    const [endH, endM] = logic.ends[serviceLevel].split(':').map(Number);
    const now = new Date();
    let endTotal = endH * 60 + endM;
    let nowTotal = now.getHours() * 60 + now.getMinutes();
    if (endH < 4) endTotal += 1440; 
    if (now.getHours() < 4) nowTotal += 1440;
    return (nowTotal >= (endTotal - 45)) && (nowTotal < endTotal + 15);
}

/* --- REPLACE getSpecificServiceNote --- */
function getSpecificServiceNote(routeId, busId, currentPattern, serviceLevel) {
    const logic = btOperationalLogic[routeId];
    if (!logic) return { isEnding: false, note: "" };

    const now = new Date();
    const nowTotal = now.getHours() * 60 + now.getMinutes() + (now.getHours() < 4 ? 1440 : 0);
    
    // PRIORITY 1: API "Last Run" Flag
    const isLR = currentPattern.includes("LR") || currentPattern.toLowerCase().includes("garage");

    // PRIORITY 2: Scheduled End Time (FY26 Route Cards)
    // Most routes end at 12:45 AM (1485 mins) or 9:45 PM (1305 mins)
    const endTimeStr = logic.ends[serviceLevel] || logic.ends["FULL SERVICE"] || "00:00";
    const [endH, endM] = endTimeStr.split(':').map(Number);
    let endTotal = endH * 60 + endM + (endH < 4 ? 1440 : 0);

    // If within 35 minutes of the scheduled end, force OUT OF SERVICE
    if (isLR || (nowTotal >= (endTotal - 35))) {
        return { isEnding: true, type: "ROUTE_END", note: "Final run. Returning to Garage." };
    }

    // PRIORITY 3: Individual Bus Pull-in (Frequency Reduction)
    const busesOnRoute = Object.values(busMarkers).filter(m => m.currentRoute === routeId).length;
    const isPullInWindow = (now.getMinutes() >= 10 && now.getMinutes() <= 25) || (now.getMinutes() >= 40 && now.getMinutes() <= 55);
    
    if (logic.multiBus && busesOnRoute > 1 && isPullInWindow && currentPattern.toLowerCase().includes("to tc")) {
        return { isEnding: true, type: "FREQ_DROP", note: "Bus finishing shift. Wait times will increase." };
    }

    return { isEnding: false, note: "" };
}

function updateServiceLevelDisplay(activeRouteIds) {
    const slText = document.getElementById('sl-text');
    const slDot = document.getElementById('sl-dot');
    const routes = new Set(activeRouteIds);
    const now = new Date();
    const day = now.getDay();
    const hour = now.getHours();
    const nowTotal = hour * 60 + now.getMinutes() + (hour < 4 ? 1440 : 0);

    // 1. DEDUCTION: Smoking Gun Detection (CRB/PHB/PRG/HWA = Full)
    const isFullService = routes.has("CRB") || routes.has("PHB") || routes.has("PRG") || routes.has("HWA") || routes.has("HXP");
    const isReducedService = routes.has("HWC") && !isFullService;

    // 2. PERSISTENCE: Don't downgrade service levels after 9:00 PM (1320 mins)
    // This stops "Holiday Service" from appearing when buses go to the garage
    if (isFullService) {
        inferredServiceLevel = (day === 0 || day === 6) ? "FULL WEEKEND" : "FULL SERVICE";
        slDot.className = "sl-indicator sl-full";
    } else if (isReducedService) {
        if (nowTotal < 1320 || inferredServiceLevel === "REDUCED SERVICE") {
            inferredServiceLevel = "REDUCED SERVICE";
            slDot.className = "sl-indicator sl-reduced";
        }
    } else if (routes.size > 0 && routes.size < 5 && nowTotal > 480 && nowTotal < 1200) {
        // Holiday detection only active between 8 AM and 8 PM
        inferredServiceLevel = "HOLIDAY SERVICE";
        slDot.className = "sl-indicator sl-holiday";
    }

    // 3. "ENDING SOON" LOGIC: System-wide alerts based on schedule windows
    let suffix = "";
    if (routes.size > 0) {
        // Flag ending soon if within 45 minutes of scheduled stop
        if (inferredServiceLevel.includes("FULL") && nowTotal >= 1410) suffix = " - SERVICE ENDING";
        else if (inferredServiceLevel === "REDUCED SERVICE" && nowTotal >= 1275) suffix = " - SERVICE ENDING";
        else if (inferredServiceLevel === "HOLIDAY SERVICE" && nowTotal >= 1095) suffix = " - SERVICE ENDING";
    } else {
        suffix = " (OFFLINE)";
    }

    if (slText) slText.innerText = inferredServiceLevel + suffix;

    const idNum = parseInt(id) || 0;

    const jLon = lon + ( ((idNum % 2) - 0.5) * jitterAmount * 2 );

        const color = getRouteColor(currentRoute);

        return `<div class="bus-rotate-wrap" style="transform: rotate(${heading}deg)">${bodyHtml}${electricHtml}${topBadgeHtml}</div>`;
    };

    // Use the version timestamp from the API to drive the live counter [cite: 324, 507]
    const popupTimestamp = versionTs || Date.now();
const updateTs = versionTs || Date.now();
    if (busMarkers[id]) {
        const m = busMarkers[id];
        m.predictionData = {
        lastLat: lat, lastLon: lon, heading: heading,

        m.data = { speed, percentCap, adherence, version: versionTs };

             m.setIcon(L.divIcon({ className: 'bus-icon-container', html: newIconHtml, iconSize: [60, 60], iconAnchor: [30, 30] }));
             m.currentRoute = route;
             m.prevTopBadge = (isTimePoint && isStopped);
             m.prevCap = percentCap;

        m.setLatLng([jLat, jLon]);
        const wrapper = m.getElement()?.querySelector('.bus-rotate-wrap');
        if (wrapper) wrapper.style.transform = `rotate(${heading}deg)`;
        
        if (id === selectedBusId) m.setZIndexOffset(1000); else m.setZIndexOffset(0);

        // Update the popup content immediately if it's open to refresh the live counter [cite: 498]
        const popupHtml = getPopup(id, route, pattern, pax, speed, adherence, isStopped, percentCap, isTimePoint, popupTimestamp, lat, lon);
        m.setPopupContent(popupHtml);
    } else {

function predictNextDeparture(cachedSchedule, stopLat, stopLon, currentRouteId, stopCode, routeShape, allStops, currentStopSequence) {
    const now = new Date();
    
    // --- KEEPING YOUR DIAGNOSTICS ---
    console.groupCollapsed(`🔍 PREDICTING STOP #${stopCode} (${currentRouteId})`);
    
    if (!cachedSchedule || cachedSchedule.length === 0) {
        console.warn("⚠️ Schedule Empty: Service likely ended for the day.");
        console.groupEnd();
        return { type: "end_of_service", scheduledTime: now, dest: "N/A" };
    }

    const firstScheduled = cachedSchedule[0];
    const scheduledTime = firstScheduled.date;
    console.log(`📅 API Anchor Time: ${scheduledTime.toLocaleTimeString()} (Dest: ${firstScheduled.dest})`);

    const activeBuses = [];
    const showAllRoutes = allRoutesMode[stopCode] || false;
    
    // --- KEEPING YOUR ROBUST FILTERING ---
    Object.values(busMarkers).forEach(m => {
        if (!showAllRoutes && m.currentRoute !== currentRouteId) return;

        const busPos = { 
            lat: m.getLatLng().lat, 
            lon: m.getLatLng().lng, 
            heading: m.heading || 0, 
            id: m.busId, 
            route: m.currentRoute,
            data: m.data || {} 
        };
        const dist = getDistance(busPos.lat, busPos.lon, stopLat, stopLon);
        const hasPassed = hasBusPassed(busPos, stopLat, stopLon);
        
        let busStopSequence = -1;
        if (allStops && allStops.length > 0) {
            let minDist = Infinity;
            allStops.forEach((stop, idx) => {
                const d = getDistance(busPos.lat, busPos.lon, stop.lat, stop.lon);
                if (d < minDist && d < 150) {
                    minDist = d;
                    busStopSequence = idx;
                }
            });
        }
        
        activeBuses.push({ ...busPos, distance: dist, stopSequence: busStopSequence, hasPassed: hasPassed });
    });

    let validBuses = activeBuses.filter(b => !b.hasPassed);

    validBuses.sort((a, b) => {
        if (a.stopSequence >= 0 && b.stopSequence >= 0 && a.stopSequence !== b.stopSequence) {
            return a.stopSequence - b.stopSequence;
        }
        return a.distance - b.distance;
    });

    validBuses = validBuses.filter(bus => {
        if (bus.distance < 30 && bus.hasPassed) return false;
        return true;
    });

    let bestBus = null;
    let bestMatch = null;
    
    // --- KEEPING YOUR MATCHING LOOP ---
    for (const bus of validBuses) {
        // Pass routeShape and activeBuses to the physics engine
        const seconds = calculatePrecisionETA(bus, stopLat, stopLon, currentStopSequence, bus.stopSequence, routeShape, activeBuses);
        
        if (seconds === null || seconds < 0) continue;
        
        const loopEtaTime = new Date(now.getTime() + (seconds * 1000));

        let closestScheduleMatch = null;
        let minTimeDiff = Infinity;
        
        cachedSchedule.forEach((schedEntry) => {
            if (showAllRoutes && schedEntry.route !== bus.route) return;
            
            const timeDiff = (loopEtaTime - schedEntry.date) / 60000;
            const absDiff = Math.abs(timeDiff);
            const dist = bus.distance;
            
            if (dist < 500 && absDiff > 15) return;
            
            if (absDiff < minTimeDiff) {
                minTimeDiff = absDiff;
                closestScheduleMatch = schedEntry;
            }
        });
        
        if (closestScheduleMatch && minTimeDiff < 30) {
            // Your "Quality Check" logic
            if (bestBus && bestMatch) {
                const currentMatchQuality = minTimeDiff + (bus.distance / 1000); 
                const prevMatchQuality = Math.abs((bestBus.etaTime - bestMatch.date) / 60000) + (bestBus.distance / 1000);
                
                if (currentMatchQuality >= prevMatchQuality) continue; 
            }
            
            bestBus = { ...bus, seconds, etaTime: loopEtaTime };
            bestMatch = closestScheduleMatch;
        }
    }

    if (!bestBus || !bestMatch) {
        const timeSinceScheduled = (now - scheduledTime) / 60000;
        console.log(`⚠️ No Match. Time since: ${timeSinceScheduled.toFixed(1)} min`);

    }

    if (!bestMatch.isTimecheck) {

    if (timecheckConstraint && etaTime < timecheckConstraint) {
        console.log(`🛡️ Timecheck Constraint Applied`);
        etaTime = new Date(timecheckConstraint.getTime() + 60000);
        bestBus.seconds = (etaTime - now) / 1000;
    }
    
    let adherenceMinutes = (etaTime - matchedScheduledTime) / 60000;
    
    if (adherenceMinutes < -1.5) {
        console.log(`🛡️ Early Clamp Applied`);
        etaTime = new Date(matchedScheduledTime.getTime() - 30000);

        adherenceMinutes = -0.5;
    }

    console.log(`📊 Final Calc: Adherence ${adherenceMinutes.toFixed(1)}m, Dist ${Math.round(distToStop)}m`);

    if (distToStop < 50 && bestBus.seconds < 30) {
        console.log("👉 Result: ARRIVED/HOLDING");
        console.groupEnd();

        if (bestMatch.isTimecheck) {
            const holdSeconds = (matchedScheduledTime - now) / 1000;
            if (holdSeconds > 0) {
                return { 
                    type: "timecheck_holding", 
                    seconds: holdSeconds, 
                    busId: bestBus.id, 
                    scheduledTime: matchedScheduledTime,

    // --- MATH ENGINE ---
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
        const Δφ = (lat2-lat1) * Math.PI/180, Δλ = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(Δφ/2)*Math.sin(Δφ/2) + Math.cos(φ1)*Math.cos(φ2) * Math.sin(Δλ/2)*Math.sin(Δλ/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function hasBusPassed(bus, stopLat, stopLon) {
        const dist = getDistance(bus.lat, bus.lon, stopLat, stopLon);
        
        if (dist < 35) return false; 

        const y = Math.sin((stopLon - bus.lon) * Math.PI / 180) * Math.cos(stopLat * Math.PI / 180);
        const x = Math.cos(bus.lat * Math.PI / 180) * Math.sin(stopLat * Math.PI / 180) -
                  Math.sin(bus.lat * Math.PI / 180) * Math.cos(stopLat * Math.PI / 180) * Math.cos((stopLon - bus.lon) * Math.PI / 180);
        const bearingToStop = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;

        let angleDiff = Math.abs(bus.heading - bearingToStop);
        if (angleDiff > 180) angleDiff = 360 - angleDiff;

        return (angleDiff > 90 && dist > 35);
    }

    // ✅ ADVANCED ETA: Considers stops remaining, load, and traffic
function calculatePrecisionETA(bus, stopLat, stopLon, targetStopSeq, busStopSeq, routeShape, allActiveBuses) {
    if (!bus || typeof bus.lat !== 'number' || typeof bus.lon !== 'number') return null;

   let roadDist;
    if (routeShape && routeShape.length > 0) {
         roadDist = getDistanceAlongRoute(routeShape, bus.lat, bus.lon, stopLat, stopLon);
    } else {
         const d = getDistance(bus.lat, bus.lon, stopLat, stopLon);
         if (d < 15) return 0;
         roadDist = d * 1.35;
         console.log("FALLING BACK; NO ROUTE PATH FOR DISTANCE");
    }

    let currentSpeedMph = Number(bus.speed) || 0; 
    let currentSpeedMps = currentSpeedMph * 0.44704;
    let effectiveSpeed = 6.7;
    
    let adherence = Number(bus.adherence) || 0;
    let urgencyMultiplier = 1.0;
    
    if (adherence > 5) {
        urgencyMultiplier = 1.15;
    } else if (adherence < -2) {
        urgencyMultiplier = 0.85;
    }

    const now = new Date();
    const hour = now.getHours();
    const isWeekend = (now.getDay() === 0 || now.getDay() === 6);
    let trafficDrag = 1.0;

    if (!isWeekend && hour >= 16 && hour <= 18) {
        trafficDrag = 0.8;
    }

    if (currentSpeedMph > 35) {
        effectiveSpeed = currentSpeedMps;
    } else if (currentSpeedMph > 5) {
        effectiveSpeed = ((currentSpeedMps * 0.7) + (6.7 * 0.3)) * urgencyMultiplier * trafficDrag;
    } else {
        effectiveSpeed = 6.7 * trafficDrag; 
    }

    let seconds = (roadDist / effectiveSpeed);

    if (typeof targetStopSeq === 'number' && typeof busStopSeq === 'number' && 
        targetStopSeq >= 0 && busStopSeq >= 0 && targetStopSeq > busStopSeq) {
        
        const stopsRemaining = targetStopSeq - busStopSeq;
        
        let percentCap = Number(bus.percentCap) || 0;
        
        let dwellTimePerStop = 12;
        
        if (percentCap > 90) dwellTimePerStop = 25;
        else if (percentCap > 50) dwellTimePerStop = 18;
        else if (percentCap < 10) dwellTimePerStop = 8;

        seconds += (stopsRemaining * dwellTimePerStop);
    }

    let isTrailing = false;
    if (allActiveBuses) {
        const leader = allActiveBuses.find(b => 
            b.id !== bus.id && 
            b.route === bus.route && 
            b.stopSequence > busStopSeq && 
            b.stopSequence < busStopSeq + 4
        );
        if (leader) isTrailing = true;
    }

let intersectionPenalty = 0;
    
    if (targetStopSeq > busStopSeq && roadDist > 0) {
        const stopsToPass = targetStopSeq - busStopSeq;
        const distMiles = roadDist * 0.000621371;
        
        // Calculate "Stop Density"
        const stopsPerMile = stopsToPass / distMiles;
        
        if (stopsPerMile > 8) {
            intersectionPenalty = distMiles * 45; 
        }
    }

    if (targetStopSeq > busStopSeq) {
        const stopsRemaining = targetStopSeq - busStopSeq;
        let percentCap = Number(bus.percentCap) || 0;
        
        let dwellTimePerStop = 12;
        if (percentCap > 90) dwellTimePerStop = 25;      
        else if (percentCap > 50) dwellTimePerStop = 18; 
        else if (percentCap < 10) dwellTimePerStop = 8;  

        if (isTrailing) {
            dwellTimePerStop = dwellTimePerStop * 0.4;
            console.log(`Bus ${bus.id} is drafting/bunching - speeding up dwell times.`);
        }

        seconds += (stopsRemaining * dwellTimePerStop);
    }

    if (roadDist < 200) {
        seconds += 8;
    }
    
    return Math.max(0, Math.round(seconds));
}
function getPopup(busId, currentRoute, currentPattern, pax, rawSpeed, adherence, isStopped, percentCap, isTimePoint, timestamp, lat, lon) {
    const routeColor = getRouteColor(currentRoute);
    const logic = btOperationalLogic[currentRoute];
    const speed = parseFloat(rawSpeed) || 0;
    const now = new Date();

let alertBanner = ""; 
    let nextPatternDisplay = "Repeating Loop";
    let bayNote = logic ? `Catch at ${logic.bay}` : "";

    // 1. SMART SPEED & PACE (Centered Speedometer Icon)
    const paceColor = speed === 0 ? "#94a3b8" : (speed > 35 ? "#cf4420" : "#22c55e");
    const displaySpeed = speed > 35 ? 35 + Math.floor(Math.random() * 2) : Math.round(speed);
    const paceWidth = Math.min(100, (displaySpeed / 45) * 100);

    // 2. LIVE TIMER: Absolute Time + Counter (Fixes Trillion Seconds Bug)
    const updateMs = (timestamp > 1000000000000) ? timestamp : timestamp * 1000;
    const timeStr = new Date(updateMs).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit', second: '2-digit' });
    const secondsAgo = Math.max(0, Math.floor((Date.now() - updateMs) / 1000));
    const timeLabel = `Updated at ${timeStr} (${secondsAgo}s ago)`;

    // 3. LOAD SANITIZATION & GROUP ICON
    const isDataErr = pax > 150; // Filter realistic capacity
    const cleanPax = isDataErr ? "!" : pax;
    const loadColor = (percentCap > 85 || isDataErr) ? "#d32f2f" : "#64748b";

    // 4. STATUS & SPATIAL LOGIC
    let status = isStopped ? (isTimePoint ? "Timecheck" : "At Stop") : "En Route";
    let statusColor = isStopped ? routeColor : "#1565c0"; // Match route color at stops
    
    // Spatial Off-Route Detection (requires checkSpatialDistance helper)
    if (typeof checkSpatialDistance === "function" && checkSpatialDistance(lat, lon)) {
        status = "Off Route"; statusColor = "#d32f2f";
    }

    // 5. ENHANCED TRANSITION LOGIC (BT FY26 Routecards)
    const isLR = currentPattern.includes("LR");
    const isGoingGarage = currentPattern.toLowerCase().includes("garage") || currentPattern.toLowerCase().includes("out of service");
    
const serviceInfo = getSpecificServiceNote(currentRoute, busId, currentPattern, inferredServiceLevel);

if (serviceInfo.isEnding) {
        if (serviceInfo.type === "ROUTE_END") {
            nextPatternDisplay = "OUT OF SERVICE";
            bayNote = "No more runs today.";
            alertBanner = `<div class="pop-alert-banner banner-last-run">FINAL TRIP OF SERVICE</div>`;
        } else {
            nextPatternDisplay = "Ending Shift / Pulling In";
            bayNote = "Route frequency decreasing.";
            alertBanner = `<div class="pop-alert-banner banner-transition" style="background:#fff3e0; color:#e65100; border-color:#ffe0b2;">FREQUENCY DECREASING</div>`;
        }
    } else if (currentRoute === "CAS") {
        nextPatternDisplay = currentPattern.includes("Orange") ? "CAS to Maroon Loop" : "CAS to Orange Loop";
        bayNote = currentPattern.includes("Orange") ? "Catch at Maroon Bay 5" : "Catch at Orange Bay 14";
    } else if (logic && logic.paired) {
        nextPatternDisplay = `Switch to ${logic.next}`;
        alertBanner = `<div class="pop-alert-banner banner-transition">🔄 Switches to ${logic.next} next</div>`;
    }

    if (isLR || isGoingGarage) {
        nextPatternDisplay = "Ending Service";
        bayNote = "Final run";
    } else if (currentRoute === "CAS") {
        nextPatternDisplay = currentPattern.includes("Orange") ? "CAS to Maroon Loop" : "CAS to Orange Loop";
        bayNote = currentPattern.includes("Orange") ? "Catch at Maroon Bay 5" : "Catch at Orange Bay 14";
        if (serviceInfo.type === "ROUTE_END") {
            nextPatternDisplay = "OUT OF SERVICE";
            bayNote = "No more runs today.";
            alertBanner = `<div class="pop-alert-banner banner-last-run">FINAL TRIP OF SERVICE</div>`;
        } 
    } else if (logic && logic.paired) {
        nextPatternDisplay = `Switch to ${logic.next}`;
        if (serviceInfo.type === "ROUTE_END") {
            nextPatternDisplay = "OUT OF SERVICE";
            bayNote = "No more runs today.";
            alertBanner = `<div class="pop-alert-banner banner-last-run">FINAL TRIP OF SERVICE</div>`;
        } 
    } else if (logic && logic.next === "HWC") {
        // Only show transition if time is past the card's threshold (12:15 or 12:45)
        if (now.getHours() > logic.tHour || (now.getHours() === logic.tHour && now.getMinutes() >= logic.tMin)) {
            nextPatternDisplay = "Switching to HWC (Combined)";
        }
        if (serviceInfo.type === "ROUTE_END") {
            nextPatternDisplay = "OUT OF SERVICE";
            bayNote = "No more runs today.";
            alertBanner = `<div class="pop-alert-banner banner-last-run">FINAL TRIP OF SERVICE</div>`;
        } 
    }

    return `
        <div class="pop-h" style="background:${routeColor}">${currentRoute} • Bus ${busId}</div>
        <div class="pop-b">
            ${alertBanner}
            <div class="bus-grid">
                <div class="bus-stat">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="${paceColor}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4.5 18a8.5 8.5 0 1 1 15 0"></path><path d="m12 14 4-4"></path><path d="M12 14a1 1 0 1 0 0 2 1 1 0 0 0 0-2Z"></path>
                    </svg>
                    <span class="stat-label">Speed</span>
                    <span class="stat-value">${displaySpeed} <span style="font-size:9px">MPH</span></span>
                    <div class="pace-gauge"><div class="pace-fill" style="width:${paceWidth}%; background:${paceColor}"></div></div>
                </div>
                <div class="bus-stat">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="${loadColor}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    <span class="stat-label">Load</span>
                    <span class="stat-value" style="color:${loadColor}">${cleanPax} <span style="font-size:9px">PAX</span></span>
                    <span style="font-size:9px; color:#94a3b8; font-weight:700;">${isDataErr ? 'Sensor Error' : percentCap + '% CAP'}</span>
                </div>
                <div class="bus-stat">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="${statusColor}" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <span class="stat-label">Status</span>
                    <span class="stat-value" style="color:${statusColor}; font-size:11px;">${status}</span>
                </div>
            </div>
            <div style="background:#f8fafc; padding:12px; border-radius:10px; border:1px solid #e2e8f0; position:relative;">
                <div style="margin-bottom:8px">
                    <div style="font-size:9px; font-weight:800; color:#94a3b8; text-transform:uppercase;">Current Pattern</div>
                    <div style="font-size:12px; color:#1e293b; font-weight:600;">${currentPattern}</div>
                </div>
                <div style="margin-bottom:4px">
                    <div style="font-size:9px; font-weight:800; color:#94a3b8; text-transform:uppercase;">Next Expected</div>
                    <div style="font-size:11px; color:#475569; font-weight:500;">${nextPatternDisplay}</div>
                    <div style="font-size:10px; color:${routeColor}; font-weight:800;">${bayNote}</div>
                </div>
                <div style="font-size:9px; color:#94a3b8; margin-top:10px; text-align:right; font-weight:700;">${timeLabel}</div>
            </div>
        </div>`;
}

// Spatial helper to check if bus is off the line
function checkSpatialDistance(busLat, busLon) {
    const routeLine = shapeLayer.getLayers()[0];
    if (!routeLine) return false;
    const busLatLng = L.latLng(busLat, busLon);
    let minDistance = Infinity;
    const points = routeLine.getLatLngs();
    for (let i = 0; i < points.length; i++) {
        const d = busLatLng.distanceTo(points[i]);
        if (d < minDistance) minDistance = d;
    }
    return minDistance > 100; // Off-Route if > 120 meters from line
}

/* --- ADD TO <script> --- */
function hapticFeedback(type = 'light') {
    if (!window.navigator.vibrate) return;
    
    if (type === 'light') navigator.vibrate(10);
    else if (type === 'medium') navigator.vibrate(20);
    else if (type === 'warning') navigator.vibrate([30, 50, 30]);
}

// ✅ NEW GEOMETRY ENGINE: Calculates real distance along the polyline
function getDistanceAlongRoute(shape, startLat, startLon, endLat, endLon) {
    if (!shape || shape.length < 2) return getDistance(startLat, startLon, endLat, endLon) * 1.35;

    let busIdx = -1;
    let minBusDist = Infinity;
    
    for (let i = 0; i < shape.length; i++) {
        const d = getDistance(startLat, startLon, shape[i][0], shape[i][1]);
        if (d < minBusDist) {
            minBusDist = d;
            busIdx = i;
        }
    }

    let stopIdx = -1;
    let minStopDist = Infinity;

    for (let i = 0; i < shape.length; i++) {
        const d = getDistance(endLat, endLon, shape[i][0], shape[i][1]);
        if (d < minStopDist) {
            minStopDist = d;
            stopIdx = i;
        }
    }

    if (busIdx === -1 || stopIdx === -1) return getDistance(startLat, startLon, endLat, endLon) * 1.35;

    let totalMeters = 0;

    if (busIdx <= stopIdx) {
        for (let i = busIdx; i < stopIdx; i++) {
            totalMeters += getDistance(shape[i][0], shape[i][1], shape[i+1][0], shape[i+1][1]);
        }
    } else {
        for (let i = busIdx; i < shape.length - 1; i++) {
            totalMeters += getDistance(shape[i][0], shape[i][1], shape[i+1][0], shape[i+1][1]);
        }
        for (let i = 0; i < stopIdx; i++) {
            totalMeters += getDistance(shape[i][0], shape[i][1], shape[i+1][0], shape[i+1][1]);
        }
    }

    return totalMeters;
}

        if (openRoute) document.getElementById(`group-${openRoute}`)?.classList.add('open');
    }

    function toggleRoute(route) {
        const isClosing = (openRoute === route);
        
        if (isClosing) {
            clearSelection();
        } else {
            document.querySelectorAll('.route-group').forEach(el => el.classList.remove('open'));
            openRoute = route;
            currentSelectedRoute = route;
            document.getElementById(`group-${route}`).classList.add('open');
        }
    }

    /* --- ADD TO <script> --- */
const sidebar = document.getElementById('sidebar');
const dragHandle = document.getElementById('drag-handle');
const header = document.querySelector('.header');

let startY = 0;
let currentTranslateY = 0;
let isDragging = false;

// Thresholds for snapping
const collapsedY = window.innerHeight - 130; // Matches your CSS calc
const expandedY = 0;

function handleDragStart(e) {
    if (window.innerWidth >= 768) return; // Disable on desktop
    isDragging = true;
    startY = e.touches[0].clientY;
    sidebar.classList.add('dragging');
    hapticFeedback('light');
}

function handleDragMove(e) {
    if (!isDragging) return;

    const deltaY = e.touches[0].clientY - startY;
    const isCurrentlyOpen = sidebar.classList.contains('open');
    
    // Calculate new position
    let newTranslate = isCurrentlyOpen ? deltaY : (collapsedY + deltaY);

    // Bounds: Don't let it pull too far up or down
    if (newTranslate < 0) newTranslate = newTranslate * 0.2; // Rubber band effect
    
    sidebar.style.transform = `translateY(${newTranslate}px)`;
    currentTranslateY = newTranslate;
}

function handleDragEnd() {
    if (!isDragging) return;
    isDragging = false;
    sidebar.classList.remove('dragging');
    sidebar.style.transform = ''; // Clear inline style to let CSS take over

    // Snapping Logic
    if (currentTranslateY < window.innerHeight * 0.6) {
        sidebar.classList.add('open');
        hapticFeedback('medium');
    } else {
        sidebar.classList.remove('open');
        hapticFeedback('light');
    }
}

// Attach listeners to both handle and header for easier grabbing
[dragHandle, header].forEach(el => {
    el.addEventListener('touchstart', handleDragStart, { passive: true });
    el.addEventListener('touchmove', handleDragMove, { passive: true });
    el.addEventListener('touchend', handleDragEnd);
});

async function toggleAllRoutes(stopCode, currentRoute) {
    allRoutesMode[stopCode] = document.getElementById(`allroutes-${stopCode}`).checked;
    
    // Clear and restart the timer
    if (liveEtaTimer) {
        clearInterval(liveEtaTimer);
    }
    
    // Show loading state
    const timerEl = document.getElementById(`eta-timer-${stopCode}`);
    const subEl = document.getElementById(`eta-sub-${stopCode}`);
    if (timerEl) timerEl.innerText = "Refreshing...";
    if (subEl) subEl.innerText = "Loading all routes...";
    
    // Force immediate update by calling the stored update function
    if (window.activeStopUpdateFunction) {
        // Clear old schedule to force fresh fetch
        await window.activeStopUpdateFunction();
        
        // Restart the timer
        if (liveEtaTimer) clearInterval(liveEtaTimer);
        liveEtaTimer = setInterval(window.activeStopUpdateFunction, 1000);
    }
}

/* --- ADD TO BOTTOM OF SCRIPT --- */
function predictBusMotion() {
    const now = Date.now();
    Object.values(busMarkers).forEach(m => {
        if (!m.predictionData || m.predictionData.speed < 1) return;

        const elapsed = (now - m.predictionData.lastUpdate) / 1000;
        if (elapsed > 10) return; // Prevent "ghosting" if data is too old

        const speedMps = m.predictionData.speed * 0.44704;
        const distMeters = speedMps * elapsed;
        const headingRad = (m.predictionData.heading - 90) * (Math.PI / 180);

        // Calculate new predicted coordinates (Dead Reckoning)
        const lat = m.predictionData.lastLat + (distMeters * Math.sin(headingRad)) / 111320;
        const lon = m.predictionData.lastLon + (distMeters * Math.cos(headingRad)) / (111320 * Math.cos(m.predictionData.lastLat * Math.PI / 180));

        m.setLatLng([lat, lon]);
    });
    requestAnimationFrame(predictBusMotion);
}
