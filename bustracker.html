/* --- ADD TO SCRIPT --- */
function isActuallyLastRun(routeId, serviceLevel) {
    const logic = btOperationalLogic[routeId];
    if (!logic || !logic.ends || !logic.ends[serviceLevel]) return false;
    const [endH, endM] = logic.ends[serviceLevel].split(':').map(Number);
    const now = new Date();
    let endTotal = endH * 60 + endM;
    let nowTotal = now.getHours() * 60 + now.getMinutes();
    if (endH < 4) endTotal += 1440; 
    if (now.getHours() < 4) nowTotal += 1440;
    return (nowTotal >= (endTotal - 45)) && (nowTotal < endTotal + 15);
}

function getDetailedBusContext(routeId, busId, currentPattern, serviceLevel) {
    const logic = btOperationalLogic[routeId];
    if (!logic) return { isEnding: false, note: "" };

    const now = new Date();
    const nowMins = now.getHours() * 60 + now.getMinutes() + (now.getHours() < 4 ? 1440 : 0);
    const day = now.getDay(); 

// 1. DYNAMIC END TIME RESOLUTION (Fixes split error)
    const routeEnds = logic.ends[serviceLevel] || logic.ends["FULL SERVICE"] || logic.ends["DEFAULT"] || "00:00";
    let endStr = "";
    
    if (typeof routeEnds === 'object') {
        if ((day === 5 || day === 6) && routeEnds.FRI_SAT) endStr = routeEnds.FRI_SAT;
        else if (day === 5 && routeEnds.FRI) endStr = routeEnds.FRI;
        else endStr = routeEnds.MON_THU || routeEnds.DEFAULT || "01:00";
    } else {
        endStr = routeEnds;
    }

    if (!endStr || typeof endStr !== 'string') endStr = "00:00";

    const [eH, eM] = endStr.split(':').map(Number);
    let endTotal = eH * 60 + eM + (eH < 4 ? 1440 : 0);

    // 2. PAIRING & SWITCH LOGIC (NMG / SME)
    if (logic.switchTime && serviceLevel === "FULL SERVICE") {
        const [sH, sM] = logic.switchTime.split(':').map(Number);
        const switchTotal = sH * 60 + sM;
        if (nowMins >= switchTotal && nowMins < switchTotal + 30) {
            return { isEnding: false, type: "SWITCH", note: `Transitioning to paired loop.` };
        }
    }

    // 3. HETHWOOD MERGER (HWA/B -> HWC)
    if (logic.transitionTime) {
        const [tH, tM] = logic.transitionTime.split(':').map(Number);
        const transTotal = tH * 60 + tM;
        if (nowMins >= (transTotal - 20) && nowMins <= transTotal) {
            return { isEnding: true, type: "MERGE", note: `Merging into HWC loop soon.` };
        }
    }

    // 4. LAST RUN DETECTION
    if (currentPattern.includes("LR") || currentPattern.toLowerCase().includes("garage") || nowMins >= (endTotal - 35)) {
        return { isEnding: true, type: "ROUTE_END", note: "Final run. Returning to Garage." };
    }

    // 5. SHIFT CHANGE FREQUENCY DROP (Predictive)
    const mins = now.getMinutes();
    const isShiftWindow = (mins >= 40 && mins <= 55) || (mins >= 10 && mins <= 25);
    const busesOnRoute = Object.values(busMarkers).filter(m => m.currentRoute === routeId).length;
    
    if (logic.multiBus && busesOnRoute > 1 && isShiftWindow && currentPattern.toLowerCase().includes("to tc")) {
        return { isEnding: true, type: "FREQ_DROP", note: "Shift ending. Bus pulling in soon." };
    }

    return { isEnding: false, note: "" };
}

 async function initDynamicTheme() {

        const lat = 37.2296, lng = -80.4139;
        const response = await fetch(`https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lng}&formatted=0`);
        const data = await response.json();
        
        const sunrise = new Date(data.results.sunrise);
        const sunset = new Date(data.results.sunset);

        function checkSun() {
            if (isManualTheme) return;
            const now = new Date();
            applyTheme(now < sunrise || now > sunset);
        }

        // Initialize immediately
        checkSun();
        // Check every minute thereafter
        setInterval(checkSun, 60000);
        
    } catch (e) {
        console.error("Solar engine failed, defaulting to clock check.");
        const hour = new Date().getHours();
        applyTheme(hour >= 20 || hour < 6);

async function checkAlerts() {
    try {

        if (alerts && alerts.length > 0) {

            if (currentHash !== lastAlertHash) {
                alertBox.style.display = 'block';
                // Re-render the inner div
                alertBox.innerHTML = `<div id="alert-inner">${fullAlertText}</div>`;
                alertBox.title = alerts.map(a => `${a.title}: ${a.message}`).join('\n\n');
                lastAlertHash = currentHash;

                // --- DYNAMIC SPEED CALCULATION ---
                const inner = document.getElementById('alert-inner');
                // Wait a moment for the browser to calculate the width of the new text
                setTimeout(() => {
                    const scrollSpeed = 150; // Pixels per second. Increase for faster, decrease for slower.
                    const textWidth = inner.offsetWidth;
                    const containerWidth = alertBox.offsetWidth;
                    
                    // The animation moves the text its own width plus the container width
                    const totalDistance = textWidth + containerWidth;
                    const duration = totalDistance / scrollSpeed;
                    
                    inner.style.animationDuration = `${duration}s`;
                }, 50);
            }
        } else {
            if (lastAlertHash !== "") {
                alertBox.style.display = 'none';
                alertBox.innerHTML = "";
                lastAlertHash = "";
            }
        }
    } catch(e) {
        console.error("Alert check failed", e);
    }

        const timeSinceLast = now - window.busPings[id].last;
        window.busPings[id].last = now;
        
        // Calculate an Exponential Moving Average of how fast the API is responding
        window.busPings[id].avg = (window.busPings[id].avg * 0.7) + (timeSinceLast * 0.3);

    // --- MATH ENGINE ---
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
        const Δφ = (lat2-lat1) * Math.PI/180, Δλ = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(Δφ/2)*Math.sin(Δφ/2) + Math.cos(φ1)*Math.cos(φ2) * Math.sin(Δλ/2)*Math.sin(Δλ/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

function hasBusPassed(bus, stopLat, stopLon) {
        const dist = getDistance(bus.lat, bus.lon, stopLat, stopLon);
        if (dist < 15) return false; // Too close to reliably calculate bearing

        const y = Math.sin((stopLon - bus.lon) * Math.PI / 180) * Math.cos(stopLat * Math.PI / 180);
        const x = Math.cos(bus.lat * Math.PI / 180) * Math.sin(stopLat * Math.PI / 180) -
                  Math.sin(bus.lat * Math.PI / 180) * Math.cos(stopLat * Math.PI / 180) * Math.cos((stopLon - bus.lon) * Math.PI / 180);
        const bearingToStop = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;

        let angleDiff = Math.abs(bus.heading - bearingToStop);
        if (angleDiff > 180) angleDiff = 360 - angleDiff;

        const speedMph = (bus.data && bus.data.speed) ? Number(bus.data.speed) : 0;

        // Condition 1: Bus is pointing away (angle > 90) and has cleared the immediate stop box (20m)
        if (angleDiff > 90 && dist > 20) return true;
        
        // Condition 2: Bus blew past or accelerated away. Moving fast (>10mph), pointing slightly away.
        if (angleDiff > 60 && dist > 20 && speedMph > 5) return true;

        return false;
    }

    }

    let currentSpeedMph = Number(bus.speed) || 0; 
    let currentSpeedMps = currentSpeedMph * 0.44704;
    let effectiveSpeed = 6.7;
    
    let adherence = Number(bus.adherence) || 0;
    let urgencyMultiplier = 1.0;
    
    if (adherence > 5) {
        urgencyMultiplier = 1.15;
    } else if (adherence < -2) {
        urgencyMultiplier = 0.85;
    }

    const now = new Date();
    const hour = now.getHours();
    const isWeekend = (now.getDay() === 0 || now.getDay() === 6);
    let trafficDrag = 1.0;

    if (!isWeekend && hour >= 16 && hour <= 18) {
        trafficDrag = 0.8;
    }

    if (roadDist < 500) {
        // Enforce a minimum rolling speed of ~15mph (6.7 m/s) so stop signs don't ruin the timer
        effectiveSpeed = Math.max(6.7, (currentSpeedMps * 0.4) + (6.7 * 0.6));
    } else if (currentSpeedMph > 35) {
        effectiveSpeed = currentSpeedMps;
    } else if (currentSpeedMph > 5) {
        effectiveSpeed = ((currentSpeedMps * 0.7) + (6.7 * 0.3)) * urgencyMultiplier * trafficDrag;
    } else {
        effectiveSpeed = 6.7 * trafficDrag; 
    }

    let seconds = (roadDist / effectiveSpeed);

    if (typeof targetStopSeq === 'number' && typeof busStopSeq === 'number' && 
        targetStopSeq >= 0 && busStopSeq >= 0 && targetStopSeq > busStopSeq) {
        
        const stopsRemaining = targetStopSeq - busStopSeq;
        
        let percentCap = Number(bus.percentCap) || 0;
        
        let dwellTimePerStop = 12;
        
        if (percentCap > 90) dwellTimePerStop = 25;
        else if (percentCap > 50) dwellTimePerStop = 18;
        else if (percentCap < 10) dwellTimePerStop = 8;

        seconds += (stopsRemaining * dwellTimePerStop);
    }

    let isTrailing = false;
    if (allActiveBuses) {
        const leader = allActiveBuses.find(b => 
            b.id !== bus.id && 
            b.route === bus.route && 
            b.stopSequence > busStopSeq && 
            b.stopSequence < busStopSeq + 4
        );
        if (leader) isTrailing = true;
    }

let intersectionPenalty = 0;
    
    if (targetStopSeq > busStopSeq && roadDist > 0) {
        const stopsToPass = targetStopSeq - busStopSeq;
        const distMiles = roadDist * 0.000621371;
        
        // Calculate "Stop Density"
        const stopsPerMile = stopsToPass / distMiles;
        
        if (stopsPerMile > 8) {
            intersectionPenalty = distMiles * 45; 
        }
    }

    if (targetStopSeq > busStopSeq) {
        const stopsRemaining = targetStopSeq - busStopSeq;
        let percentCap = Number(bus.percentCap) || 0;
        
        let dwellTimePerStop = 12;
        if (percentCap > 90) dwellTimePerStop = 25;      
        else if (percentCap > 50) dwellTimePerStop = 18; 
        else if (percentCap < 10) dwellTimePerStop = 8;  

        if (isTrailing) {
            dwellTimePerStop = dwellTimePerStop * 0.4;
            console.log(`Bus ${bus.id} is drafting/bunching - speeding up dwell times.`);
        }

        seconds += (stopsRemaining * dwellTimePerStop);
    }

if (roadDist < 300) {
        seconds -= 18; 
    }
    
    return Math.max(0, Math.round(seconds));
}

// Spatial helper to check if bus is off the line
function checkSpatialDistance(busLat, busLon) {
    const routeLine = shapeLayer.getLayers()[0];
    if (!routeLine) return false;
    const busLatLng = L.latLng(busLat, busLon);
    let minDistance = Infinity;
    const points = routeLine.getLatLngs();
    for (let i = 0; i < points.length; i++) {
        const d = busLatLng.distanceTo(points[i]);
        if (d < minDistance) minDistance = d;
    }
    return minDistance > 120; // Off-Route if > 120 meters from line
}

// ✅ NEW GEOMETRY ENGINE: Calculates real distance along the polyline
function getDistanceAlongRoute(shape, startLat, startLon, endLat, endLon) {
    if (!shape || shape.length < 2) return getDistance(startLat, startLon, endLat, endLon) * 1.35;

    let busIdx = -1;
    let minBusDist = Infinity;
    
    for (let i = 0; i < shape.length; i++) {
        const d = getDistance(startLat, startLon, shape[i][0], shape[i][1]);
        if (d < minBusDist) {
            minBusDist = d;
            busIdx = i;
        }
    }

    let stopIdx = -1;
    let minStopDist = Infinity;

    for (let i = 0; i < shape.length; i++) {
        const d = getDistance(endLat, endLon, shape[i][0], shape[i][1]);
        if (d < minStopDist) {
            minStopDist = d;
            stopIdx = i;
        }
    }

    if (busIdx === -1 || stopIdx === -1) return getDistance(startLat, startLon, endLat, endLon) * 1.35;

    let totalMeters = 0;

    if (busIdx <= stopIdx) {
        for (let i = busIdx; i < stopIdx; i++) {
            totalMeters += getDistance(shape[i][0], shape[i][1], shape[i+1][0], shape[i+1][1]);
        }
    } else {
        for (let i = busIdx; i < shape.length - 1; i++) {
            totalMeters += getDistance(shape[i][0], shape[i][1], shape[i+1][0], shape[i+1][1]);
        }
        for (let i = 0; i < stopIdx; i++) {
            totalMeters += getDistance(shape[i][0], shape[i][1], shape[i+1][0], shape[i+1][1]);
        }
    }

    return totalMeters;
}

map.on('locationfound', function(e) {
    const btn = document.getElementById('locate-control-btn');
    if(btn) {
        btn.style.opacity = "1";
        btn.classList.remove('locating');
    }
    if (userMarker) {
        userMarker.setLatLng(e.latlng);
    } else {
        userMarker = L.marker(e.latlng, {icon: userLocationIcon}).addTo(map);
    }
});

map.on('locationerror', function(e) {
    alert("Location access denied.");
});

function centerOnUser() {
    if (userCoords) {
        map.flyTo(userCoords, 16);
        hapticFeedback('medium');
    } else {
        alert("Location not found yet. Please ensure GPS is enabled.");
    }
}

setInterval(checkAlerts, 120000);

function shouldRouteBeRunning(routeId) {
    const logic = btOperationalLogic[routeId];
    if (!logic || !logic.ends) return false;

    const now = new Date();
    const nowMins = now.getHours() * 60 + now.getMinutes() + (now.getHours() < 4 ? 1440 : 0);
    
    // Resolve dynamic end time safely
    const routeEnds = logic.ends[inferredServiceLevel] || logic.ends["FULL SERVICE"] || logic.ends["DEFAULT"] || "00:00";
    
    let endStr = "";
    if (typeof routeEnds === 'object') {
        const day = now.getDay();
        if ((day === 5 || day === 6) && routeEnds.FRI_SAT) endStr = routeEnds.FRI_SAT;
        else endStr = routeEnds.MON_THU || routeEnds.DEFAULT || "01:00";
    } else {
        endStr = routeEnds;
    }

    const [eH, eM] = endStr.split(':').map(Number);
    let endTotal = eH * 60 + eM + (eH < 4 ? 1440 : 0);

    return (nowMins >= 400 && nowMins < endTotal); 
}
const tracker = {
    userId: localStorage.getItem('bt_user_id') || 'u-' + Math.random().toString(36).substr(2, 9),
    sessionId: 's-' + Math.random().toString(36).substr(2, 9),
    
    init() {
        // Save user ID so we recognize them next time they return
        localStorage.setItem('bt_user_id', this.userId);
        
        // 1. Log the initial view
        this.send('/log_session', { userId: this.userId, sessionId: this.sessionId });
        
        // 2. Start the heartbeat (Every 30 seconds)
        setInterval(() => {
            this.send('/heartbeat', { sessionId: this.sessionId });
        }, 30000);
    },

    async send(endpoint, data) {
        try {
            await fetch(`${API}${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
        } catch (e) { /* Fail silently to not disturb user */ }
    }
};

// Start tracking immediately
tracker.init();
